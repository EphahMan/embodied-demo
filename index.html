        }
        40% {
          transform: translate(4px, -2px);
        }
        60% {

        }
        80% {
          transform: translate(3px, 2px);
        }

          transform: translate(0, 0);
        }

        animation: fadeIn 220ms ease-out;

    <script type="module">
      import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
 
      const AudioPaths = {
        ding: 'assets/audio/ding.mp3',
        wind: 'assets/audio/wind.mp3',
        heartbeat: 'assets/audio/heartbeat.mp3',
        rock: 'assets/audio/rock.mp3',
        nature: 'assets/audio/nature.mp3'
      };
 
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const lerp = (a, b, t) => a + (b - a) * t;
      const clientToWorldOrtho = (camera, clientX, clientY) => {
        const w = window.innerWidth || 1;
        const h = window.innerHeight || 1;
        const ndc = new THREE.Vector3((clientX / w) * 2 - 1, -(clientY / h) * 2 + 1, 0);
        return ndc.unproject(camera);
      };
 
      const rafThrottle = (fn, minMs) => {
        let last = 0;
        return (...args) => {
          const now = performance.now();
          if (now - last < minMs) return;
          last = now;
          fn(...args);
        };
      };
 
      const toast = (() => {
        const el = document.getElementById('toast');
        const text = document.getElementById('toastText');
        let t = null;
        return (msg, ms = 1200) => {
          text.textContent = msg;
          el.classList.remove('hidden');
          el.classList.add('fade-in');
          clearTimeout(t);
          t = setTimeout(() => {
            el.classList.add('hidden');
            el.classList.remove('fade-in');
          }, ms);
        };
      })();
 
      const Telemetry = (() => {
        const key = 'embodied_demo_telemetry_v1';
        const max = 120;
        const read = () => {
          try {
            const raw = localStorage.getItem(key);
            return raw ? JSON.parse(raw) : [];
          } catch {
            return [];
          }
        };
        const write = (arr) => {
          try {
            localStorage.setItem(key, JSON.stringify(arr.slice(-max)));
          } catch {}
        };
        const push = (evt) => {
          const arr = read();
          arr.push(evt);
          write(arr);
        };
        const safeString = (v) => {
          try {
            if (v instanceof Error) return `${v.name}: ${v.message}`;
            if (typeof v === 'string') return v.slice(0, 600);
            return JSON.stringify(v).slice(0, 600);
          } catch {
            return String(v).slice(0, 600);
          }
        };
        const report = (type, payload) => {
          const evt = { ts: Date.now(), type, payload: safeString(payload), href: location.href };
          push(evt);
          if (type === 'error' || type === 'unhandledrejection') console.error(type, payload);
          else console.log(type, payload);
        };
        window.addEventListener('error', (e) => {
          report('error', { message: e.message, filename: e.filename, lineno: e.lineno, colno: e.colno });
        });
        window.addEventListener('unhandledrejection', (e) => {
          report('unhandledrejection', e.reason);
        });
        const get = () => read();
        const clear = () => {
          try {
            localStorage.removeItem(key);
          } catch {}
        };
        return { report, get, clear };
      })();
 
      const PerfHUD = (() => {
        const el = document.createElement('div');
        el.className =
          'fixed bottom-3 left-3 z-[60] hidden max-w-[92vw] rounded-2xl bg-black/60 px-4 py-3 text-xs leading-relaxed text-white/90 backdrop-blur';
        el.style.pointerEvents = 'auto';
        document.body.appendChild(el);
        let visible = false;
        let rafId = null;
        let lastT = 0;
        let winT = 0;
        let winFrames = 0;
        let fps = 0;
        let longTasks = 0;
        let maxFrameMs = 0;
        let watchdogBase = performance.now();
        let watchdogTimer = null;
        const fmt = (n) => (Number.isFinite(n) ? n.toFixed(1) : 'n/a');
        const render = () => {
          const mem = performance?.memory?.usedJSHeapSize ? `${Math.round(performance.memory.usedJSHeapSize / 1048576)}MB` : 'n/a';
          el.textContent = `FPS: ${fps} | MaxFrame: ${fmt(maxFrameMs)}ms | LongTask: ${longTasks} | Heap: ${mem}`;
        };
        const loop = (t) => {
          if (!visible) return;
          if (lastT) maxFrameMs = Math.max(maxFrameMs, t - lastT);
          lastT = t;
          if (!winT) winT = t;
          winFrames++;
          if (t - winT >= 1000) {
            fps = Math.round((winFrames * 1000) / (t - winT));
            winT = t;
            winFrames = 0;
            render();
          }
          rafId = requestAnimationFrame(loop);
        };
        const toggle = () => {
          visible = !visible;
          el.classList.toggle('hidden', !visible);
          if (visible) {
            fps = 0;
            longTasks = 0;
            maxFrameMs = 0;
            lastT = 0;
            winT = 0;
            winFrames = 0;
            render();
            rafId = requestAnimationFrame(loop);
            watchdogBase = performance.now();
            watchdogTimer = setInterval(() => {
              const now = performance.now();
              const drift = now - watchdogBase - 1000;
              watchdogBase = now;
              if (drift > 1500) Telemetry.report('watchdog_stall', { driftMs: Math.round(drift) });
            }, 1000);
          } else {
            if (rafId) cancelAnimationFrame(rafId);
            rafId = null;
            if (watchdogTimer) clearInterval(watchdogTimer);
            watchdogTimer = null;
          }
        };
        const onKey = (e) => {
          if (e.key === 'p' || e.key === 'P') toggle();
        };
        window.addEventListener('keydown', onKey);
        try {
          const po = new PerformanceObserver((list) => {
            for (const e of list.getEntries()) {
              if (e.duration >= 50) longTasks++;
            }
          });
          po.observe({ entryTypes: ['longtask'] });
        } catch {}
        return { toggle };
      })();
 
      class CameraManager {
        constructor(videoEl) {
          this.videoEl = videoEl;
          this.stream = null;
          this.ready = false;
        }
        async start() {
          if (this.stream) return this.stream;
          const constraints = {
            video: {
              facingMode: { ideal: 'environment' },
              width: { ideal: 1280 },
              height: { ideal: 720 },
              frameRate: { ideal: 30, max: 30 }
            },
            audio: false
          };
          this.stream = await navigator.mediaDevices.getUserMedia(constraints);
          this.videoEl.srcObject = this.stream;
          await this.videoEl.play();
          await new Promise((resolve) => {
            if (this.videoEl.readyState >= 2) return resolve();
            const onLoaded = () => {
              this.videoEl.removeEventListener('loadeddata', onLoaded);
              resolve();
            };
            this.videoEl.addEventListener('loadeddata', onLoaded);
          });
          this.ready = true;
          return this.stream;
        }
        stop() {
          if (!this.stream) return;
          this.stream.getTracks().forEach((t) => t.stop());
          this.stream = null;
          this.ready = false;
        }
      }
 
      class AudioManager {
        constructor() {
          this.ctx = null;
          this.buffers = new Map();
          this.loopSource = null;
          this.loopGain = null;
        }
        async initFromGesture() {
          if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          if (this.ctx.state !== 'running') await this.ctx.resume();
        }
        async load(url) {
          if (this.buffers.has(url)) return this.buffers.get(url);
          if (!this.ctx) throw new Error('AudioContext not ready');
          const res = await fetch(url);
          const arr = await res.arrayBuffer();
          const buf = await this.ctx.decodeAudioData(arr);
          this.buffers.set(url, buf);
          return buf;
        }
        async playOneShot(url, { volume = 1 } = {}) {
          await this.initFromGesture();
          const buf = await this.load(url);
          const src = this.ctx.createBufferSource();
          const gain = this.ctx.createGain();
          gain.gain.value = volume;
          src.buffer = buf;
          src.connect(gain);
          gain.connect(this.ctx.destination);
          src.start();
          return src;
        }
        async startLoop(url, { volume = 0.7 } = {}) {
          await this.initFromGesture();
          await this.stopLoop();
          const buf = await this.load(url);
          const src = this.ctx.createBufferSource();
          const gain = this.ctx.createGain();
          gain.gain.value = volume;
          src.buffer = buf;
          src.loop = true;
          src.connect(gain);
          gain.connect(this.ctx.destination);
          src.start();
          this.loopSource = src;
          this.loopGain = gain;
        }
        async stopLoop() {
          if (this.loopSource) {
            try {
              this.loopSource.stop();
            } catch {}
          }
          this.loopSource = null;
          this.loopGain = null;
        }
      }
 
      class MicAnalyser {
        constructor(audioManager) {
          this.audioManager = audioManager;
          this.stream = null;
          this.analyser = null;
          this.timeData = null;
          this.freqData = null;
          this._hp = null;
          this._lastLevel = 0;
        }
        async start() {
          if (this.analyser) return;
          await this.audioManager.initFromGesture();
          this.stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
          const src = this.audioManager.ctx.createMediaStreamSource(this.stream);
          this._hp = this.audioManager.ctx.createBiquadFilter();
          this._hp.type = 'highpass';
          this._hp.frequency.value = 120;
          this.analyser = this.audioManager.ctx.createAnalyser();
          this.analyser.fftSize = 2048;
          this.analyser.smoothingTimeConstant = 0.75;
          src.connect(this._hp);
          this._hp.connect(this.analyser);
          this.timeData = new Uint8Array(this.analyser.fftSize);
          this.freqData = new Uint8Array(this.analyser.frequencyBinCount);
        }
        stop() {
          if (this.stream) this.stream.getTracks().forEach((t) => t.stop());
          this.stream = null;
          this.analyser = null;
          this.timeData = null;
          this.freqData = null;
          this._hp = null;
          this._lastLevel = 0;
        }
        getRms() {
          if (!this.analyser || !this.timeData) return 0;
          this.analyser.getByteTimeDomainData(this.timeData);
          let sum = 0;
          for (let i = 0; i < this.timeData.length; i++) {
            const v = (this.timeData[i] - 128) / 128;
            sum += v * v;
          }
          return Math.sqrt(sum / this.timeData.length);
        }
        getLevel({ lowHz = 250, highHz = 2400 } = {}) {
          if (!this.analyser || !this.freqData) return 0;
          this.analyser.getByteFrequencyData(this.freqData);
          const sr = this.audioManager.ctx.sampleRate || 48000;
          const binHz = sr / this.analyser.fftSize;
          const lo = clamp(Math.floor(lowHz / binHz), 0, this.freqData.length - 1);
          const hi = clamp(Math.floor(highHz / binHz), lo + 1, this.freqData.length);
          let sum = 0;
          for (let i = lo; i < hi; i++) sum += this.freqData[i];
          const avg = sum / Math.max(1, hi - lo);
          const norm = clamp(avg / 255, 0, 1);
          this._lastLevel = this._lastLevel ? lerp(this._lastLevel, norm, 0.35) : norm;
          return this._lastLevel;
        }
      }
 
      class HandsTracker {
        constructor(videoEl) {
          this.videoEl = videoEl;
          this.hands = null;
          this.running = false;
          this.latest = null;
          this._inflight = false;
          this._rafId = null;
          this._lastSent = 0;
          this._minIntervalMs = 1000 / 15;
          this._sendErrors = 0;
          this._lastErrWindow = 0;
        }
        async start({ targetFps = 15 } = {}) {
          if (this.running) return;
          this._minIntervalMs = 1000 / clamp(targetFps, 5, 30);
          this._lastSent = 0;
          this._sendErrors = 0;
          this._lastErrWindow = 0;
          this.hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
          });
          this.hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
          });
          this.hands.onResults((res) => {
            this.latest = res;
            this._inflight = false;
          });
          this.running = true;
          this._loop();
        }
        stop() {
          this.running = false;
          this.latest = null;
          this._inflight = false;
          if (this._rafId) cancelAnimationFrame(this._rafId);
          this._rafId = null;
          if (this.hands && this.hands.close) {
            try {
              this.hands.close();
            } catch {}
          }
          this.hands = null;
        }
        _loop() {
          const step = (t) => {
            if (!this.running) return;
            if (!this.hands) return;
            if (!this.videoEl.videoWidth || !this.videoEl.videoHeight) {
              this._rafId = requestAnimationFrame(step);
              return;
            }
            const canSend = !this._inflight && t - this._lastSent >= this._minIntervalMs;
            if (canSend) {
              this._inflight = true;
              this._lastSent = t;
              this.hands
                .send({ image: this.videoEl })
                .catch((e) => {
                  this._inflight = false;
                  Telemetry.report('hands_send_error', e);
                  const now = performance.now();
                  if (now - this._lastErrWindow > 4000) {
                    this._lastErrWindow = now;
                    this._sendErrors = 0;
                  }
                  this._sendErrors++;
                  if (this._sendErrors >= 8) {
                    Telemetry.report('hands_stopped_due_errors', { windowMs: 4000, count: this._sendErrors });
                    this.stop();
                  }
                });
            }
            this._rafId = requestAnimationFrame(step);
          };
          this._rafId = requestAnimationFrame(step);
        }
        getPinchPointViewport({ pinchThreshold = 0.045 } = {}) {
          const res = this.latest;
          if (!res || !res.multiHandLandmarks || !res.multiHandLandmarks[0]) return null;
          const lm = res.multiHandLandmarks[0];
          const thumb = lm[4];
          const index = lm[8];
          const dx = thumb.x - index.x;
          const dy = thumb.y - index.y;
          const dist = Math.hypot(dx, dy);
          const pinched = dist <= pinchThreshold;
          if (!pinched) return null;
          const x = (thumb.x + index.x) * 0.5;
          const y = (thumb.y + index.y) * 0.5;
          const rect = this.videoEl.getBoundingClientRect();
          return { x: rect.left + x * rect.width, y: rect.top + y * rect.height };
        }
      }
 
      class ThreeLayer {
        constructor(canvas) {
          this.canvas = canvas;
          this.renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true, powerPreference: 'high-performance' });
          this.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
          this.renderer.setClearColor(0x000000, 0);
          this.renderer.shadowMap.enabled = true;
          this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
          this.scene = null;
          this.camera = null;
          this._running = false;
          this._tick = null;
          this._onResize = () => this.resize();
          window.addEventListener('resize', this._onResize);
          this.resize();
        }
        resize() {
          const w = window.innerWidth;
          const h = window.innerHeight;
          this.renderer.setSize(w, h, false);
          if (this.camera && this.camera.isOrthographicCamera) {
            this.camera.left = -w / 2;
            this.camera.right = w / 2;
            this.camera.top = h / 2;
            this.camera.bottom = -h / 2;
            this.camera.updateProjectionMatrix();
          }
          if (this.camera && this.camera.isPerspectiveCamera) {
            this.camera.aspect = w / h;
            this.camera.updateProjectionMatrix();
          }
        }
        setScene(scene, camera, tickFn) {
          this.scene = scene;
          this.camera = camera;
          this._tick = tickFn || null;
        }
        start() {
          if (this._running) return;
          this._running = true;
          const loop = () => {
            if (!this._running) return;
            if (this._tick) this._tick(performance.now());
            if (this.scene && this.camera) this.renderer.render(this.scene, this.camera);
            requestAnimationFrame(loop);
          };
          requestAnimationFrame(loop);
        }
        stop() {
          this._running = false;
          this.scene = null;
          this.camera = null;
          this._tick = null;
          this.renderer.clear();
        }
      }
 
      class ThreeInteractor {
        constructor(three, ui) {
          this.three = three;
          this.ui = ui;
          this.enabled = true;
          this.isTransforming = false;
          this.activeRoot = null;
          this.mode = null;
          this._raycaster = new THREE.Raycaster();
          this._ndc = new THREE.Vector2();
          this._startWorld = new THREE.Vector3();
          this._dragOffset = new THREE.Vector3();
          this._startRot = new THREE.Euler();
          this._startPos = new THREE.Vector3();
          this._targets = [];
          this._pointerMap = new Map();
          this._twoStart = null;
          this._wheelStopTimer = null;
          this._bind();
        }
        setTargets(roots) {
          this._targets = Array.isArray(roots) ? roots.filter(Boolean) : [];
        }
        pickRootAt(clientX, clientY) {
          if (!this.enabled) return null;
          if (!this._targets.length) return null;
          return this._pickRoot(clientX, clientY);
        }
        clearTargets() {
          this._targets = [];
          this._endTransform();
        }
        _bind() {
          document.addEventListener('pointerdown', (e) => this._onPointerDown(e), true);
          document.addEventListener('pointermove', (e) => this._onPointerMove(e), true);
          document.addEventListener('pointerup', (e) => this._onPointerUp(e), true);
          document.addEventListener('pointercancel', (e) => this._onPointerUp(e), true);
          document.addEventListener(
            'wheel',
            (e) => {
              this._onWheel(e);
            },

              const pos = this.particles.geometry.attributes.position;
              for (let i = 0; i < pos.count; i++) {
                pos.array[i * 3 + 0] += this.vel[i * 3 + 0];
                pos.array[i * 3 + 1] += this.vel[i * 3 + 1];

          await this.ctx.mic.start();
          await this.ctx.hands.start({ targetFps: 15 });
          let last = performance.now();
          const loop = () => {
            if (this._done) return;
            const now = performance.now();
            const dt = now - last;
            last = now;
            const pinch = this.ctx.hands.getPinchPointViewport({ pinchThreshold: 0.045 });

          this._done = true;

            const p = clamp((t - start) / dur, 0, 1);

            if (!this._flickDown) return;
            const dy = e.clientY - this._flickDown.y;
            const dt = performance.now() - this._flickDown.t;
            this._flickDown = null;
            if (dy < -140 && dt < 420) {
              await this.ctx.audio.playOneShot(AudioPaths.rock, { volume: 0.85 }).catch(() => {});
              this._reveal();
            }
          }, { capture: true });
        }
        async start() {}
        _reveal() {
          if (!this.rock || !this.bug) return;
          this.bug.visible = true;
          toast('发现昆虫！');
          const startY = this.rock.position.y;
          const endY = startY + window.innerHeight * 0.9;
          const start = performance.now();
          const dur = 520;
          const tick = (t) => {
            const p = clamp((t - start) / dur, 0, 1);
            const ease = 1 - Math.pow(1 - p, 3);
            this.rock.position.y = startY + (endY - startY) * ease;
            this.rock.rotation.z += 0.03;
            if (p < 1) this._anim = requestAnimationFrame(tick);
          };
          this._anim = requestAnimationFrame(tick);
        }
        async unmount() {
          if (this._anim) cancelAnimationFrame(this._anim);
          this._anim = null;
          UI.touchAreaHint.classList.add('hidden');
          await super.unmount();
        }
      }
 
      class Level5Listen extends LevelBase {
        constructor(ctx) {
          super('level5', 'A5 倾听（熄屏）');
          this.ctx = ctx;
          this.scene = null;
          this.camera = null;
          this._canvas = document.createElement('canvas');
          this._ctx2d = this._canvas.getContext('2d', { willReadFrequently: true });
          this._timer = null;
          this._dark = false;
          this._textEl = null;
        }
        async mount() {
          this.scene = new THREE.Scene();
          this.camera = makeOrtho();
          makeLight(this.scene);
          const trunkMat = new THREE.MeshPhongMaterial({
            map: TextureKit.barkMap,
            bumpMap: TextureKit.barkBump,
            bumpScale: 6,
            color: 0x6b4b3a,
            shininess: 10
          });
          const trunk = ModelFactory.createTrunk({ deadMat: trunkMat, useLive: false });
          trunk.position.set(0, 40, 0);
          trunk.scale.set(0.9, 0.9, 0.9);
          this._trunk = trunk;
          this.scene.add(ModelFactory.createGround({ y: -window.innerHeight * 0.36, opacity: 0.06 }));
          this.scene.add(trunk);
          this.ctx.interaction.setTargets([trunk]);
          this.ctx.three.setScene(this.scene, this.camera, (t) => {
            if (this._trunk) this._trunk.rotation.y = Math.sin(t / 1000) * 0.12;
          });
          const text = document.createElement('div');
          text.className = 'absolute left-1/2 top-1/2 z-20 w-[min(92vw,34rem)] -translate-x-1/2 -translate-y-1/2 rounded-3xl bg-black/50 p-6 text-center text-base font-semibold leading-relaxed text-white/90 backdrop-blur';
          text.textContent = '请闭上眼睛，将手机屏幕紧紧贴在你的胸口或耳朵上';
          UI.levelView.appendChild(text);
          this._textEl = text;
          this._cleanup.push(() => text.remove());
          UI.blackoutOverlay.classList.add('hidden');
          this._canvas.width = 32;
          this._canvas.height = 32;
        }
        async start() {
          const sample = async () => {
            if (!this.ctx.camera.ready) return;
            const v = this.ctx.video;
            if (!v.videoWidth || !v.videoHeight) return;
            this._ctx2d.drawImage(v, 0, 0, this._canvas.width, this._canvas.height);
            const img = this._ctx2d.getImageData(0, 0, this._canvas.width, this._canvas.height).data;
            let sum = 0;
            for (let i = 0; i < img.length; i += 4) sum += (img[i] + img[i + 1] + img[i + 2]) / 3;
            const avg = sum / (img.length / 4);
            const dark = avg < 10;
            if (dark !== this._dark) {
              this._dark = dark;
              if (dark) {
                UI.blackoutOverlay.classList.remove('hidden');
                await this.ctx.audio.startLoop(AudioPaths.nature, { volume: 0.7 }).catch(() => {});
              } else {
                UI.blackoutOverlay.classList.add('hidden');
                await this.ctx.audio.stopLoop();
              }
            }
          };
          await sample();
          this._timer = setInterval(sample, 1000);
        }
        async unmount() {
          if (this._timer) clearInterval(this._timer);
          this._timer = null;
          UI.blackoutOverlay.classList.add('hidden');
          await this.ctx.audio.stopLoop();
          await super.unmount();
        }
      }
 
      class App {
        constructor() {
          this.video = document.getElementById('cameraVideo');
          this.camera = new CameraManager(this.video);
          this.audio = new AudioManager();
          this.mic = new MicAnalyser(this.audio);
          this.hands = new HandsTracker(this.video);
          this.three = new ThreeLayer(document.getElementById('threeCanvas'));
          this.three.start();
          this.interaction = new ThreeInteractor(this.three, UI);
          this.currentLevel = null;
          this.levels = new Map();
          this._wireUI();
          this._initRoutes();
        }
        async dispose() {
          try {
            await this._leaveLevel();
          } catch {}
          try {
            this.camera.stop();
          } catch {}
          try {
            this.hands.stop();
          } catch {}
          try {
            this.mic.stop();
          } catch {}
          try {
            await this.audio.stopLoop();
          } catch {}
          try {
            this.three.stop();
          } catch {}
        }
        _wireUI() {
          document.querySelectorAll('[data-nav]').forEach((btn) => {
            btn.addEventListener('click', () => Router.nav(`/${btn.dataset.nav}`), { passive: true });
          });
          UI.backHome.addEventListener('click', () => Router.nav('/'), { passive: true });
        }
        _initRoutes() {
          Router.add('/', async () => {
            await this._leaveLevel();
            UI.levelView.classList.add('hidden');
            UI.homeView.classList.remove('hidden');
          });
          ['level1', 'level2', 'level3', 'level4', 'level5'].forEach((id) => {
            Router.add(`/${id}`, async () => {
              UI.homeView.classList.add('hidden');
              UI.levelView.classList.remove('hidden');
              await this._enterLevel(id);
            });
          });
          Router.start();
        }
        async _ensureBaseReady({ needMic = false } = {}) {
          await this.audio.initFromGesture();
          await this.camera.start();
          if (needMic) await this.mic.start();
        }
        async _enterLevel(id) {
          await this._leaveLevel();
          UI.levelTitle.textContent = id;
          UI.backpackIcon.classList.add('hidden');
          UI.backpackIcon.classList.remove('flex');
          UI.leafSprite.classList.add('hidden');
          UI.touchAreaHint.classList.add('hidden');
          UI.transformHud.classList.add('hidden');
          UI.blackoutOverlay.classList.add('hidden');
          const ctx = { video: this.video, camera: this.camera, audio: this.audio, mic: this.mic, hands: this.hands, three: this.three, interaction: this.interaction };
          let level = this.levels.get(id);
          if (!level) {
            if (id === 'level1') level = new Level1PinchCollect(ctx);
            if (id === 'level2') level = new Level2Blow(ctx);
            if (id === 'level3') level = new Level3Stroke(ctx);
            if (id === 'level4') level = new Level4FlipReveal(ctx);
            if (id === 'level5') level = new Level5Listen(ctx);
            this.levels.set(id, level);
          }
          this.currentLevel = level;
          UI.levelTitle.textContent = level.title;
          await level.mount();
          const gateConfig = this._gateForLevel(id);
          showGate({
            title: gateConfig.title,
            desc: gateConfig.desc,
            onStart: async () => {
              await this._ensureBaseReady({ needMic: gateConfig.needMic });
              await gateConfig.prefetch?.();
              await level.start();
            }
          });
        }
        _gateForLevel(id) {
          if (id === 'level1') {
            return {
              title: 'B1 捏取收集',
              desc: '点击开始后将启用摄像头与手势追踪。用拇指和食指捏住树叶即可收集。',
              needMic: false,
              prefetch: async () => {
                await this.audio.load(AudioPaths.ding).catch(() => {});
              }
            };
          }
          if (id === 'level2') {
            return {
              title: 'B2 吹气',
              desc: '点击开始后将启用摄像头、麦克风与音频。对着麦克风持续吹气 1 秒钟。',
              needMic: true,
              prefetch: async () => {
                await Promise.all([this.audio.load(AudioPaths.wind).catch(() => {}), this.audio.load(AudioPaths.ding).catch(() => {})]);
              }
            };
          }
          if (id === 'level3') {
            return {
              title: 'C3 抚摸唤醒',
              desc: '点击开始后启用摄像头与音频。用手指在树干区域来回抚摸，直到它变绿发光。',
              needMic: false,
              prefetch: async () => {
                await this.audio.load(AudioPaths.heartbeat).catch(() => {});
              }
            };
          }
          if (id === 'level4') {
            return {
              title: 'A3 翻开揭示',
              desc: '点击开始后启用摄像头与音频。按住石头快速向上滑动，把它推开。',
              needMic: false,
              prefetch: async () => {
                await this.audio.load(AudioPaths.rock).catch(() => {});
              }
            };
          }
          return {
            title: 'A5 倾听熄屏',
            desc: '点击开始后启用摄像头与音频。遮挡摄像头时屏幕变黑并播放自然白噪音，移开后恢复。',
            needMic: false,
            prefetch: async () => {
              await this.audio.load(AudioPaths.nature).catch(() => {});
            }
          };
        }
        async _leaveLevel() {
          UI.startGate.classList.add('hidden');
          UI.startGate.classList.remove('flex');
          UI.blackoutOverlay.classList.add('hidden');
          UI.backpackIcon.classList.add('hidden');
          UI.backpackIcon.classList.remove('flex');
          UI.leafSprite.classList.add('hidden');
          UI.touchAreaHint.classList.add('hidden');
          UI.transformHud.classList.add('hidden');
          this.hands.stop();
          this.mic.stop();
          this.interaction.clearTargets();
          await this.audio.stopLoop();
          if (this.currentLevel) {
            try {
              await this.currentLevel.unmount();
            } catch {}
          }
          this.currentLevel = null;
          this.three.stop();
          this.three.start();
        }
      }
 
      const boot = async () => {
        if (!navigator.mediaDevices?.getUserMedia) {
          toast('当前浏览器不支持摄像头/麦克风 API');
          return;
        }
        const app = new App();
        window.__embodiedDemoApp = app;
        window.addEventListener('pagehide', () => {
          app.dispose();
        });
        window.addEventListener('beforeunload', () => {
          app.dispose();
        });
        document.addEventListener('visibilitychange', () => {
          if (!document.hidden) return;
          try {
            app.hands.stop();
          } catch {}
          try {
            app.mic.stop();
          } catch {}
          app.audio.stopLoop().catch(() => {});
        });
      };
 
      boot();
    </script>
  </body>
</html>
